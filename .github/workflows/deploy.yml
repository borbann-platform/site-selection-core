name: Deploy Production

concurrency:
  group: production-deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DB_IMAGE_NAME: borbann-platform/site-selection-core-db
  BACKEND_IMAGE_NAME: borbann-platform/site-selection-core-backend
  FRONTEND_IMAGE_NAME: borbann-platform/site-selection-core-frontend

jobs:
  backend-test:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gis-server
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gisdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d gisdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run backend integration suite
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/gisdb
          JWT_SECRET_KEY: test-secret
        run: uv run pytest tests/integration -v --tb=short

  frontend-test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Run frontend build
        run: npm run build

  build-and-push:
    timeout-minutes: 45
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Compute image tag
        id: vars
        run: echo "image_tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./gis-server
          file: ./gis-server/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push database image
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/postgres
          file: ./deploy/postgres/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DB_IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.DB_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_API_URL=/api/v1
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    timeout-minutes: 20
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy over Tailscale SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          APP_IMAGE_PULL_POLICY: missing
          RUN_APP_BOOTSTRAP: "1"
        with:
          host: ${{ secrets.VPS_TAILSCALE_IP }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: IMAGE_TAG,APP_IMAGE_PULL_POLICY,RUN_APP_BOOTSTRAP
          script: |
            set -euo pipefail
            cd /opt/app
            git checkout main
            git pull --ff-only origin main
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" APP_IMAGE_PULL_POLICY="$APP_IMAGE_PULL_POLICY" RUN_APP_BOOTSTRAP="$RUN_APP_BOOTSTRAP" APP_ENV_FILE=/opt/app/.env.production bash deploy/scripts/deploy.sh

      - name: Health check
        run: |
          curl --fail --retry 6 --retry-delay 10 --retry-connrefused "${{ secrets.APP_HEALTHCHECK_URL }}"

      - name: Mark deploy successful
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_TAILSCALE_IP }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/app
            bash deploy/scripts/mark-success.sh

      - name: Roll back on failure
        if: failure() && needs.build-and-push.result == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_TAILSCALE_IP }}
          username: ${{ secrets.VPS_DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/app
            APP_ENV_FILE=/opt/app/.env.production bash deploy/scripts/rollback.sh

      - name: Notify Slack on success
        if: success() && env.SLACK_WEBHOOK_PRESENT == 'true'
        env:
          SLACK_WEBHOOK_PRESENT: ${{ secrets.SLACK_WEBHOOK != '' && 'true' || 'false' }}
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":white_check_mark: Production deploy succeeded for ${{ github.sha }}"}'

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_PRESENT == 'true'
        env:
          SLACK_WEBHOOK_PRESENT: ${{ secrets.SLACK_WEBHOOK != '' && 'true' || 'false' }}
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":red_circle: Production deploy failed for ${{ github.sha }} and rollback was attempted"}'
