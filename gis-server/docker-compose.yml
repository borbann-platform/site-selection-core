version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gis_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gisdb
    ports:
      - "5432:5432"
    volumes:
      - gis_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  gis_data:
    name: gis_server_data
