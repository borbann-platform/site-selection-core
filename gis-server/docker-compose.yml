services:
  db:
    image: postgis/postgis:16-3.4
    container_name: gis_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=gisdb
    ports:
      - "5432:5432"
    volumes:
      - gis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2026-01-18T19-40-09Z
    container_name: gis_minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gis_backend
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/gisdb
      - JWT_SECRET_KEY=local-dev-secret
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - GOOGLE_API_KEY=
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=false
      - MINIO_BUCKET=listing-images
      - MINIO_OBJECT_PREFIX=scraped-listings
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - .:/app
      - ./models:/app/models
      - ./data:/app/data
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: gis_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    restart: unless-stopped

  mlflow-db:
    image: postgres:16
    container_name: mlflow_db
    environment:
      - POSTGRES_USER=mlflow
      - POSTGRES_PASSWORD=mlflow
      - POSTGRES_DB=mlflow
    ports:
      - "5433:5432"
    volumes:
      - mlflow_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow -d mlflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mlflow:
    build:
      context: ./docker/mlflow
      dockerfile: Dockerfile
    container_name: mlflow_server
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql+psycopg2://mlflow:mlflow@mlflow-db:5432/mlflow
      - MLFLOW_ARTIFACTS_DESTINATION=/mlartifacts
      - MLFLOW_HOST=0.0.0.0
      - MLFLOW_PORT=5000
    ports:
      - "5001:5000"
    depends_on:
      mlflow-db:
        condition: service_healthy
    volumes:
      - mlflow_artifacts:/mlartifacts
    command:
      - /bin/sh
      - -lc
      - >
        mlflow server
        --backend-store-uri "$$MLFLOW_BACKEND_STORE_URI"
        --artifacts-destination "$$MLFLOW_ARTIFACTS_DESTINATION"
        --serve-artifacts
        --host "$$MLFLOW_HOST"
        --port "$$MLFLOW_PORT"
    restart: unless-stopped

volumes:
  gis_data:
    name: gis_server_data
  minio_data:
    name: minio_data
  mlflow_pg_data:
    name: mlflow_pg_data
  mlflow_artifacts:
    name: mlflow_artifacts
