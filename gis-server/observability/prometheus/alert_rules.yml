groups:
  - name: sprint_a_slo
    rules:
      - alert: ApiErrorRateHigh
        expr: |
          (
            sum(rate(api_request_errors_total[5m]))
            /
            clamp_min(sum(rate(api_requests_total[5m])), 1)
          ) > 0.01
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API error rate above 1%
          description: API 5xx error rate has been above 1% for 10 minutes.

      - alert: ApiLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum by (le) (rate(api_request_duration_bucket_seconds[5m]))
          ) > 1.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency above 1.2s
          description: API p95 latency exceeds Sprint A target for 10 minutes.

      - alert: DbPoolCheckoutTimeouts
        expr: increase(db_pool_checkout_timeout_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: DB pool checkout timeouts detected
          description: DB pool checkout timeout counter increased in last 5 minutes.

      - alert: DbQueryErrorsHigh
        expr: increase(db_query_errors_total[5m]) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: DB query errors detected
          description: DB query errors increased in last 5 minutes.

      - alert: RedisCacheBackendErrors
        expr: |
          sum(increase(cache_backend_operations_total{backend="redis",result="error"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Redis cache backend errors detected
          description: One or more Redis cache operations failed in the last 5 minutes.
