<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta
      name="description"
      content="Borbann - AI-Powered Real Estate Intelligence for Bangkok"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Borbann - Site Selection</title>
    <style>
      /* Prevent white flash before CSS loads */
      html, body { margin: 0; padding: 0; }
      body { background-color: #0f0f11; }
      @media (prefers-color-scheme: light) {
        body { background-color: #fafaf9; }
      }
      /* Initial loading screen */
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background-color: inherit;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #app-loader .logo {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        background: linear-gradient(135deg, #e8613c, #e8613ccc);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 24px;
        font-family: system-ui, sans-serif;
      }
      #app-loader .spinner {
        width: 24px;
        height: 24px;
        border: 2.5px solid #e8613c33;
        border-top-color: #e8613c;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #app-loader.fade-out { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="logo">B</div>
      <div class="spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader once the app mounts
      const observer = new MutationObserver(() => {
        const app = document.getElementById('app');
        if (app && app.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.classList.add('fade-out');
            setTimeout(() => loader.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('app'), { childList: true });
    </script>
  </body>
</html>
